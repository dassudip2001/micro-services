server:
  port: 8081

spring:
  application:
    name: user-service # must match lb://USER-SERVICE in gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/ms_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

